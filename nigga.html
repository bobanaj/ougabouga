<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chat System</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    display: flex;
    height: 100vh;
}

/* LOGIN */
#auth {
    margin: auto;
}

/* APP */
#app {
    display: none;
    width: 100%;
    height: 100%;
}

/* SIDEBAR */
.sidebar {
    width: 260px;
    border-right: 1px solid #ccc;
    padding: 10px;
}

.contact {
    padding: 8px;
    cursor: pointer;
    border-bottom: 1px solid #eee;
}

/* CHAT */
.chat {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}

.input {
    display: flex;
}

input {
    padding: 10px;
    flex: 1;
}

button {
    padding: 10px;
}
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth">
    <h2>Compte</h2>
    <input id="username" placeholder="Nom"><br><br>
    <input id="password" type="password" placeholder="Mot de passe"><br><br>

    <button onclick="register()">Créer</button>
    <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app">
    <div class="sidebar">
        <h3>Ton ID :</h3>
        <div id="myId"></div>

        <h4>Recherche</h4>
        <input id="searchInput" placeholder="pdd_xxxx">
        <button onclick="addContact()">Ajouter</button>

        <h4>Contacts</h4>
        <div id="contacts"></div>
    </div>

    <div class="chat">
        <div class="messages" id="messages"></div>

        <div class="input">
            <input id="msg">
            <button onclick="send()">Envoyer</button>
        </div>
    </div>
</div>

<script>
let DB = JSON.parse(localStorage.getItem("db") || "{}");
let currentUser = null;
let currentChat = null;

/* SAVE */
function save() {
    localStorage.setItem("db", JSON.stringify(DB));
}

/* REGISTER */
function register() {
    const u = document.getElementById("username").value;
    const p = document.getElementById("password").value;

    if (!u || !p) return alert("Champs requis");

    if (DB[u]) return alert("Existe déjà");

    const id = "pdd_" + Math.floor(Math.random() * 1000000);

    DB[u] = {
        password: p,
        id: id,
        contacts: [],
        messages: {}
    };

    save();
    alert("Ton ID: " + id);
}

/* LOGIN */
function login() {
    const u = document.getElementById("username").value;
    const p = document.getElementById("password").value;

    if (!DB[u] || DB[u].password !== p) {
        return alert("Erreur login");
    }

    currentUser = u;

    document.getElementById("auth").style.display = "none";
    document.getElementById("app").style.display = "flex";

    document.getElementById("myId").textContent = DB[u].id;

    renderContacts();
}

/* SEARCH + ADD CONTACT */
function addContact() {
    const id = document.getElementById("searchInput").value;

    const found = Object.keys(DB).find(u => DB[u].id === id);

    if (!found) return alert("Introuvable");

    if (!DB[currentUser].contacts.includes(found)) {
        DB[currentUser].contacts.push(found);
        save();
        renderContacts();
    }
}

/* CONTACTS UI */
function renderContacts() {
    const box = document.getElementById("contacts");
    box.innerHTML = "";

    DB[currentUser].contacts.forEach(u => {
        const div = document.createElement("div");
        div.className = "contact";
        div.textContent = u;
        div.onclick = () => openChat(u);
        box.appendChild(div);
    });
}

/* OPEN CHAT */
function openChat(user) {
    currentChat = user;
    renderMessages();
}

/* MESSAGES UI */
function renderMessages() {
    const box = document.getElementById("messages");
    box.innerHTML = "";

    const msgs = DB[currentUser].messages[currentChat] || [];

    msgs.forEach(m => {
        const div = document.createElement("div");
        div.textContent = m;
        box.appendChild(div);
    });
}

/* SEND MESSAGE */
function send() {
    const text = document.getElementById("msg").value;
    if (!text || !currentChat) return;

    if (!DB[currentUser].messages[currentChat]) {
        DB[currentUser].messages[currentChat] = [];
    }

    DB[currentUser].messages[currentChat].push("Moi: " + text);

    save();

    document.getElementById("msg").value = "";
    renderMessages();
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chat Temps Réel</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    display: flex;
    height: 100vh;
}

/* AUTH */
#auth {
    margin: auto;
}

/* APP */
#app {
    display: none;
    width: 100%;
}

/* SIDEBAR */
.sidebar {
    width: 260px;
    border-right: 1px solid #ccc;
    padding: 10px;
}

.contact {
    padding: 8px;
    cursor: pointer;
    border-bottom: 1px solid #eee;
}

/* CHAT */
.chat {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}

.input {
    display: flex;
}

input {
    padding: 10px;
    flex: 1;
}

button {
    padding: 10px;
}
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth">
    <h2>Compte</h2>
    <input id="username" placeholder="Nom"><br><br>
    <input id="password" type="password" placeholder="Mot de passe"><br><br>

    <button onclick="register()">Créer</button>
    <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app">
    <div class="sidebar">
        <h3>Ton ID</h3>
        <div id="myId"></div>

        <h4>Recherche (pdd)</h4>
        <input id="searchInput" placeholder="pdd_123">
        <button onclick="addContact()">Ajouter</button>

        <h4>Contacts</h4>
        <div id="contacts"></div>
    </div>

    <div class="chat">
        <div class="messages" id="messages"></div>

        <div class="input">
            <input id="msg">
            <button onclick="send()">Envoyer</button>
        </div>
    </div>
</div>

<script>
const SUPABASE_URL  = "https://xqfjboboiaevewtypifv.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhxZmpib2JvaWFldmV3dHlwaWZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MDg3NzQsImV4cCI6MjA4OTI4NDc3NH0.jvpfcNAe0ZN2sUeuU5pO-GyoNN2KNtOQaYmttPfcjpY";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let currentUser = null;
let currentChat = null;

/* REGISTER */
async function register() {
    const u = document.getElementById("username").value;
    const p = document.getElementById("password").value;

    if (!u || !p) return alert("Champs requis");

    const pdd = "pdd_" + Math.floor(Math.random() * 1000000);

    const { error } = await supabase
        .from("users")
        .insert([{ username: u, password: p, pdd: pdd }]);

    if (error) {
        alert("Erreur création");
        return;
    }

    alert("Compte créé. Ton ID: " + pdd);
}

/* LOGIN */
async function login() {
    const u = document.getElementById("username").value;
    const p = document.getElementById("password").value;

    const { data, error } = await supabase
        .from("users")
        .select("*")
        .eq("username", u)
        .eq("password", p)
        .single();

    if (error || !data) {
        alert("Erreur login");
        return;
    }

    currentUser = data;

    document.getElementById("auth").style.display = "none";
    document.getElementById("app").style.display = "flex";

    document.getElementById("myId").textContent = data.pdd;

    subscribeMessages();
}

/* RECHERCHE UTILISATEUR */
async function addContact() {
    const id = document.getElementById("searchInput").value;

    const { data } = await supabase
        .from("users")
        .select("*")
        .eq("pdd", id)
        .single();

    if (!data) return alert("Introuvable");

    openChat(data);
}

/* OUVRIR CHAT */
function openChat(user) {
    currentChat = user;
    document.getElementById("messages").innerHTML = "";
    loadMessages();
}

/* ENVOYER MESSAGE */
async function send() {
    const text = document.getElementById("msg").value;

    if (!text || !currentChat) return;

    await supabase.from("messages").insert([
        {
            sender: currentUser.pdd,
            receiver: currentChat.pdd,
            content: text
        }
    ]);

    document.getElementById("msg").value = "";
}

/* CHARGER MESSAGES */
async function loadMessages() {
    if (!currentChat) return;

    const { data } = await supabase
        .from("messages")
        .select("*")
        .or(`and(sender.eq.${currentUser.pdd},receiver.eq.${currentChat.pdd}),and(sender.eq.${currentChat.pdd},receiver.eq.${currentUser.pdd})`)
        .order("created_at", { ascending: true });

    const box = document.getElementById("messages");
    box.innerHTML = "";

    data.forEach(renderMessage);
}

/* AFFICHER UN MESSAGE */
function renderMessage(m) {
    const box = document.getElementById("messages");

    const div = document.createElement("div");

    div.textContent = (m.sender === currentUser.pdd)
        ? "Moi: " + m.content
        : m.content;

    box.appendChild(div);
}

/* REALTIME */
function subscribeMessages() {
    supabase
        .channel('chat')
        .on('postgres_changes', {
            event: 'INSERT',
            schema: 'public',
            table: 'messages'
        }, payload => {

            const m = payload.new;

            if (!currentChat) return;

            const isRelevant =
                (m.sender === currentUser.pdd && m.receiver === currentChat.pdd) ||
                (m.sender === currentChat.pdd && m.receiver === currentUser.pdd);

            if (isRelevant) {
                renderMessage(m);
            }

        })
        .subscribe();
}
</script>

</body>
</html>
